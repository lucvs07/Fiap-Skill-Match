{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="d-flex align-items-center mb-4">
      <a href="{{ url_for('projetos.mural') }}" class="btn btn-sm btn-outline-secondary me-3">← Voltar</a>
      <h2 class="mb-0">Publicar Projeto</h2>
    </div>
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Título do projeto</label>
            <input type="text" name="titulo" class="form-control" required autofocus
                   placeholder="ex: Agente de IA para diagnóstico médico"
                   value="{{ request.form.get('titulo', '') }}">
          </div>
          <div class="mb-3">
            <label class="form-label">Resumo do tema</label>
            <textarea name="resumo_tema" class="form-control" rows="4" required
                      placeholder="Descreva brevemente o objetivo e contexto do projeto...">{{ request.form.get('resumo_tema', '') }}</textarea>
          </div>
          <div class="mb-4">
            <label class="form-label">Número de vagas</label>
            <input type="number" name="numero_vagas" class="form-control" min="1" max="20"
                   style="max-width: 120px"
                   value="{{ request.form.get('numero_vagas', '3') }}" required>
          </div>

          {# papéis necessários #}
          <div class="mb-4">
            <label class="form-label">Papéis necessários <small class="text-muted">(opcional)</small></label>
            <div id="papeis-container"></div>
            <button type="button" id="add-papel" class="btn btn-sm btn-outline-secondary mt-2">+ Adicionar papel</button>
          </div>

          <button type="submit" class="btn btn-danger">Publicar</button>
          <a href="{{ url_for('projetos.mural') }}" class="btn btn-outline-secondary ms-2">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>


<script>
  const papeisCont = document.getElementById('papeis-container');

  function buildPapelRow() {
    const row = document.createElement('div');
    row.className = 'row g-2 mb-2 papel-row';
    row.innerHTML = `
      <div class="col-4">
        <input type="text" name="papel[]" class="form-control form-control-sm" placeholder="Papel (ex: UI/UX)">
      </div>
      <div class="col-4">
        <input type="text" name="stack[]" class="form-control form-control-sm" placeholder="Stack (ex: Figma)">
      </div>
      <div class="col-2">
        <input type="number" name="quantidade[]" class="form-control form-control-sm" placeholder="Vagas" min="1" value="1">
      </div>
      <div class="col-2">
        <button type="button" class="btn btn-sm btn-outline-danger remove-papel">✕</button>
      </div>`;
    return row;
  }

  document.getElementById('add-papel').addEventListener('click', () => {
    papeisCont.appendChild(buildPapelRow());
  });

  papeisCont.addEventListener('click', e => {
    if (e.target.classList.contains('remove-papel')) {
      e.target.closest('.papel-row').remove();
    }
  });
</script>

{% endblock %}
