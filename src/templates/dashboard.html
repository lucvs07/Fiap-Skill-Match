{% extends 'base.html' %}
{% block content %}
<div class="row mb-3">
  <div class="col-12">
    <h1 class="mb-1">Olá, {{ nome }}!</h1>
    <p class="text-muted">
      Conta: <span class="badge bg-danger">{{ tipo | capitalize }}</span>
    </p>
  </div>
</div>

<div class="row">
  <div class="col-md-4 mb-3">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-body text-center py-4">
        <h5 class="card-title">Mural de Projetos</h5>
        <p class="card-text text-muted small">Explore e publique projetos de IC</p>
        <a href="#" class="btn btn-outline-danger btn-sm">Em breve</a>
      </div>
    </div>
  </div>
  <div class="col-md-4 mb-3">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-body text-center py-4">
        <h5 class="card-title">Diretório de Mentores</h5>
        <p class="card-text text-muted small">Encontre mentores para seu projeto</p>
        <a href="#" class="btn btn-outline-danger btn-sm">Em breve</a>
      </div>
    </div>
  </div>
  <div class="col-md-4 mb-3">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-body text-center py-4">
        <h5 class="card-title">Meu Perfil</h5>
        <p class="card-text text-muted small">Gerencie suas informações</p>
        <a href="#" class="btn btn-outline-danger btn-sm">Em breve</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
